<ion-content [fullscreen]="true" class="register-content">
  <!-- Tombol Back -->
  <ion-button fill="clear" class="back-btn" routerLink="/login">
    <ion-icon name="chevron-back-outline" slot="icon-only"></ion-icon>
  </ion-button>

  <div class="top-section">
    <div class="logo-circle">
      <ion-icon name="leaf"></ion-icon>
    </div>
    <h1>Mulai Hidup Sehat</h1>
    <p>Daftar sekarang untuk mengakses<br>ratusan resep jamu tradisional.</p>
  </div>

  <div class="form-card">
    <form (ngSubmit)="register()">
      <div class="custom-input-group">
        <ion-label>Nama Lengkap</ion-label>
        <div class="input-wrapper">
          <ion-icon class="prefix-icon" name="person-outline"></ion-icon>
          <ion-input type="text" placeholder="Masukkan nama lengkap Anda" [(ngModel)]="name" name="name"></ion-input>
        </div>
      </div>

      <div class="custom-input-group">
        <ion-label>Username</ion-label>
        <div class="input-wrapper">
          <ion-icon class="prefix-icon" name="person-circle-outline"></ion-icon>
          <ion-input type="text" placeholder="Buat username unik" [(ngModel)]="username" name="username"></ion-input>
        </div>
      </div>

      <div class="custom-input-group">
        <ion-label>Kata Sandi</ion-label>
        <div class="input-wrapper">
          <ion-icon class="prefix-icon" name="lock-closed-outline"></ion-icon>
          <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Buat kata sandi yang kuat" [(ngModel)]="password" name="password"></ion-input>
          <ion-icon class="suffix-icon" [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" (click)="togglePassword()"></ion-icon>
        </div>
      </div>

      <ion-button expand="block" class="register-btn" mode="md" type="submit">
        Daftar <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </form>


  </div>
</ion-content>
